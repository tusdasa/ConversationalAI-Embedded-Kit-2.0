## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.5.0'
  # espressif/esp_board_manager: ^0.4.0

  # # Put list of dependencies here
  # # For components maintained by Espressif:
  # component: "~1.0.0"
  # # For 3rd party components:
  # username/component: ">=1.0.0,<2.0.0"
  # username2/component2:
  #   version: "~1.0.0"
  #   # For transient dependencies `public` flag can be set.
  #   # `public` flag doesn't have an effect dependencies of the `main` component.
  #   # All dependencies of `main` are public by default.
  #   public: true
  volc_conv_ai:
    path: ../../../../volc_conv_ai
    public: true
  application:
    path: ../../../../application
    public: true
  espressif/button: =4.*
  espressif/esp_hosted:
    version: ~1.1
    rules:
    - if: target in [esp32p4]

  espressif/esp_wifi_remote:
    matches:
    - if: idf_version <=5.4.0 && target in [esp32p4]
      version: ~0.4
    - if: idf_version >5.4.0 && target in [esp32p4]
      version: ~0.6

  lvgl/lvgl: 9.2.*

  espressif/esp_lcd_st77916: ^1.0.1

  espressif/esp_lcd_touch_cst816s:
    version: ^1.1.0
    public: true

  espressif/esp_lvgl_port:
    version: ^2.6.0
    public: true
  espressif/zlib: '*'

  espressif2022/esp_emote_gfx:
    version: "^1.2.0~1"
    public: true

  espressif/esp_mmap_assets:
    version: "*"
    public: true

  # gmf_audio:
  #   override_path: ../components/esp-gmf/elements/gmf_audio
  esp_board_manager: 
    version: "*"
    public: true

  # protocol_examples_common:
  #   path: ${IDF_PATH}/examples/common_components/protocol_examples_common
  # espressif2022/echo_base_control: ^0.0.2~1
  # shootao/esp_bsp_manager: ^0.1.1



  
  espressif2022/esp_vocat_base_control: ^1.0.0
  espressif/esp_board_manager: ^0.5.5
